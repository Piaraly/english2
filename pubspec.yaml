name: english_forge
description: Offline-first personal English learning command center.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  record: ^6.2.1
  just_audio: ^0.10.6
  path_provider: ^2.1.6
  file_picker: ^11.0.2
  permission_handler: ^12.0.3
  flutter_local_notifications: ^22.0.1
  timezone: ^0.10.1
  intl: ^0.20.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

name: english_forge
description: Offline-first English learning command center built around an 8-month CEFR plan.
publish_to: 'none'
version: 2.0.1+3

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: 1.0.8
  provider: 6.1.5+1
  sqflite: 2.4.2+1
  path: 1.9.1
  path_provider: 2.1.6
  shared_preferences: 2.5.5
  intl: 0.20.2
  table_calendar: 3.2.0
  record: 6.2.1
  just_audio: 0.10.6
  file_picker: 11.0.2
  flutter_local_notifications: 22.0.1
  timezone: 0.11.1
  flutter_timezone: 5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/curriculum.json
    - assets/images/app_icon.png

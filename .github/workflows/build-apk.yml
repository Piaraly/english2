name: Build EnglishForge APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

permissions:
  contents: read

concurrency:
  group: english-forge-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test and build Android
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter 3.44.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Configure Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Generate Android project
        run: flutter create --platforms=android --project-name english_forge --org com.piaraly --no-pub .

      - name: Apply Android native configuration
        run: python3 tool/configure_android.py

      - name: Resolve dependencies
        run: flutter pub get

      - name: Verify dependency graph
        run: flutter pub deps --style=compact

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Unit tests
        run: flutter test --reporter=expanded

      - name: Build universal release APK
        run: flutter build apk --release

      - name: Preserve universal APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/EnglishForge-universal-release.apk

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Generate checksums
        run: |
          cd build/app/outputs/flutter-apk
          sha256sum *.apk > SHA256SUMS.txt

      - name: Upload APK artefacts
        uses: actions/upload-artifact@v4
        with:
          name: EnglishForge-APK-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/flutter-apk/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

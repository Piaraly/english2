name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - name: Generate Android platform files
        run: flutter create --platforms=android --project-name english_forge --org com.piaraly .
      - name: Configure Android permissions
        run: dart run tool/configure_android.dart
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Build release APK
        run: flutter build apk --release --split-per-abi
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EnglishForge-APK
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30
